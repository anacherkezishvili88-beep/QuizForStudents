<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<link rel="stylesheet" href="page3global.css">
<link rel="stylesheet" href="page3style.css">
</head>
<body>
<div class="page-wrapper">
  <div class="macbook-pro">

    <!-- QUESTION TEXT -->
    <p class="text-wrapper">You're hungry and grumpy. What food would comfort you the most?</p>

    <!-- CENTRAL MOUTH IMAGE -->
    <img class="image" src="img/image-1.svg" />

    <!-- DECORATIVE DOTS -->
    <div class="ellipse"></div>
    <div class="div"></div>
    <div class="ellipse-2"></div>
    <div class="ellipse-3"></div>
    <div class="ellipse-4"></div>
    <div class="ellipse-5"></div>
    <div class="ellipse-6"></div>

    <!-- CONNECTING LINES -->
    <img class="line"   src="img/line-1.svg" />
    <img class="line-2" src="img/line-2.svg" />
    <img class="line-3" src="img/line-7.svg" />
    <img class="line-4" src="img/line-6.svg" />
    <img class="line-5" src="img/line-3.svg" />
    <img class="line-6" src="img/line-5.svg" />
    <img class="line-7" src="img/line-4.svg" />

    <!-- FOOD BUTTONS -->
    <button class="food-btn img"     data-food="chocolate" aria-label="Chocolate">
      <img src="img/image-4.svg" alt="Chocolate" />
    </button>
    <button class="food-btn image-2" data-food="banana" aria-label="Banana">
      <img src="img/image-3.svg" alt="Banana" />
    </button>
    <button class="food-btn image-3" data-food="pancakes" aria-label="Pancakes">
      <img src="img/image-5.svg" alt="Pancakes" />
    </button>
    <button class="food-btn image-4" data-food="sushi" aria-label="Sushi">
      <img src="img/image-6.svg" alt="Sushi" />
    </button>
    <button class="food-btn image-5" data-food="taco" aria-label="Taco">
      <img src="img/image-7.svg" alt="Taco" />
    </button>
    <button class="food-btn image-6" data-food="pasta" aria-label="Pasta">
      <img src="img/image-8.svg" alt="Pasta" />
    </button>
    <button class="food-btn image-7" data-food="burger" aria-label="Burger">
      <img src="img/image-2.svg" alt="Burger" />
    </button>

    <!-- NEXT BUTTON -->
    <button id="nextBtn" class="next-btn">
      <img src="img/vector-8.svg" class="next-bg" alt="" />
      <span class="text-wrapper-2">Next</span>
    </button>

  </div>
</div>
<script src="page3.js"></script>
</body>
</html>
