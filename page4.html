<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page 4</title>
  <link rel="stylesheet" href="page4global.css">
  <link rel="stylesheet" href="page4style.css">
</head>
<body>
<div class="page-wrapper">
  <div class="macbook-pro">

    <!-- BACKGROUND ANIMAL IMAGE -->
    <img class="bg-animal" src="img/image-9.svg" alt="" />

    <!-- NEXT BUTTON -->
    <button id="nextBtn" class="next-btn">
      <img src="img/vector-8.svg" class="next-bg" alt="" />
      <span class="next-text">Next</span>
    </button>

    <!-- QUESTION -->
    <p class="question-text">You've been sleeping a lot lately. What would get you out of bed right now?</p>

    <!-- THREE OPTION PHOTOS -->
    <div class="options-row">

      <div class="option">
        <button class="photo-btn" data-option="A" aria-label="Doing your hair and makeup">
          <img src="img/image-10.svg" alt="Doing your hair and makeup" />
        </button>
        <p class="option-label">A. Doing<br>your hair<br>and makeup</p>
      </div>

      <div class="option">
        <button class="photo-btn" data-option="B" aria-label="Exercising">
          <img src="img/image-11.svg" alt="Exercising" />
        </button>
        <p class="option-label">B. Exercising</p>
      </div>

      <div class="option">
        <button class="photo-btn" data-option="C" aria-label="Dancing with a friend">
          <img src="img/image-12.svg" alt="Dancing with a friend" />
        </button>
        <p class="option-label">C. Dancing<br>with a friend</p>
      </div>

    </div>

  </div>
</div>
<script src="page4.js"></script>
</body>
</html>
