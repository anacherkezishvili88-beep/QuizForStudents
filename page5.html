<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page 5</title>
  <link rel="stylesheet" href="page5global.css">
  <link rel="stylesheet" href="page5style.css">
</head>
<body>
<div class="page-wrapper">
  <div class="macbook-pro">

    <!-- BACKGROUND -->
    <img class="bg-image" src="img/image-18.svg" alt="" />

    <!-- QUESTION TEXT -->
    <p class="question-text">What brings you to flow state?</p>

    <!-- NEXT BUTTON -->
    <button id="nextBtn" class="next-btn">
      <img src="img/vector-8.svg" class="next-bg" alt="" />
      <span class="next-text">Next</span>
    </button>

    <!-- FOUR OPTION PHOTOS -->
    <div class="options-grid">

      <div class="option top-left">
        <button class="photo-btn" data-option="A" aria-label="Meditation">
          <img src="img/image-13.svg" alt="Meditation" />
        </button>
        <p class="option-label">A. Meditation</p>
      </div>

      <div class="option top-right">
        <button class="photo-btn" data-option="B" aria-label="Touching grass">
          <img src="img/image-16.svg" alt="Touching grass" />
        </button>
        <p class="option-label">B. Touching grass</p>
      </div>

      <div class="option bottom-left">
        <button class="photo-btn" data-option="C" aria-label="Music">
          <img src="img/image-14.svg" alt="Music" />
        </button>
        <p class="option-label">C. Music</p>
      </div>

      <div class="option bottom-right">
        <button class="photo-btn" data-option="D" aria-label="Gossiping">
          <img src="img/image-15.svg" alt="Gossiping" />
        </button>
        <p class="option-label">D. Gossiping</p>
      </div>

    </div>

  </div>
</div>
<script src="page5.js"></script>
</body>
</html>
