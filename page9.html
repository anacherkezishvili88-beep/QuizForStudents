<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page 9</title>
  <style>
    * {
      -webkit-font-smoothing: antialiased;
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
    }
    .page-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #a09090;
    }
    .macbook-pro {
      position: relative;
      width: 890px;
      height: 633px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.35);
    }
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <div class="macbook-pro">
    <img class="bg-image" src="img/page9-bg.png" alt="Prototype" />
  </div>
</div>
</body>
</html>
